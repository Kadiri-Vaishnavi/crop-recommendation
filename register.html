<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | CropAI Connect</title>
    <meta name="description" content="Create your free CropAI Connect account and start getting AI-powered crop recommendations tailored to your soil.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/auth.css">
</head>

<body class="auth-page">

    <!-- Animated background particles -->
    <div class="auth-bg-particles">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
    </div>

    <div class="auth-container">
        <!-- Sidebar with Image Slider -->
        <div class="auth-sidebar">
            <div class="slider-container" id="authSlider">
                <div class="slide active">
                    <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1000&auto=format&fit=crop" alt="Lush Agricultural Field">
                    <div class="slide-content">
                        <h2>Empowering Every Farmer</h2>
                        <p>Join our community and gain access to expert AI-driven crop insights.</p>
                    </div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1625246333195-78d9c38ad449?q=80&w=1000&auto=format&fit=crop" alt="Smart Farming Infographic">
                    <div class="slide-content">
                        <h2>Optimize Every Drop</h2>
                        <p>Analyze climatic data and rainfall to ensure perfect irrigation timing.</p>
                    </div>
                </div>
                <!-- Removed 3rd slide as per user request to keep only these -->
                <div class="slider-dots" id="sliderDots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- Main Register Content -->
        <div class="auth-main">
            <div class="auth-card" id="authCard">
                <div class="auth-header">
                    <a href="index.html" class="logo">
                        <div class="logo-dot"></div>
                        CropAI<span>Connect</span>
                    </a>
                    <h1>Create Account</h1>
                    <p>Join 2,000+ modern farmers worldwide</p>
                </div>

                <!-- Alert box for errors/success messages -->
                <div class="auth-alert" id="authAlert" role="alert" aria-live="polite"></div>

                <form class="auth-form" id="registerForm" novalidate>
                    <div class="input-group">
                        <label for="regName">Full Name</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user"></i>
                            <input
                                type="text"
                                id="regName"
                                name="name"
                                class="auth-input"
                                placeholder="John Doe"
                                autocomplete="name"
                                required>
                        </div>
                        <span class="field-error" id="nameError"></span>
                    </div>

                    <div class="input-group">
                        <label for="regEmail">Email Address</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input
                                type="email"
                                id="regEmail"
                                name="email"
                                class="auth-input"
                                placeholder="john@example.com"
                                autocomplete="email"
                                required>
                        </div>
                        <span class="field-error" id="emailError"></span>
                    </div>

                    <div class="input-group">
                        <label for="regPassword">Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock"></i>
                            <input
                                type="password"
                                id="regPassword"
                                name="password"
                                class="auth-input"
                                placeholder="At least 8 characters"
                                autocomplete="new-password"
                                required minlength="8">
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                        <span class="field-error" id="passwordError"></span>
                        <!-- Password strength bar -->
                        <div class="password-strength" id="pwdStrength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span class="strength-label" id="strengthLabel"></span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-shield-alt"></i>
                            <input
                                type="password"
                                id="regConfirmPassword"
                                name="confirmPassword"
                                class="auth-input"
                                placeholder="Repeat your password"
                                autocomplete="new-password"
                                required>
                        </div>
                        <span class="field-error" id="confirmPasswordError"></span>
                    </div>

                    <div class="input-group">
                        <label for="regRegion">Region / Location</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                            <input
                                type="text"
                                id="regRegion"
                                name="region"
                                class="auth-input"
                                placeholder="e.g. Punjab, India"
                                autocomplete="address-level2">
                        </div>
                    </div>

                    <div style="margin-top: 0.5rem;">
                        <label class="remember-me" style="font-size: 0.85rem;">
                            <input type="checkbox" id="agreeTerms" required>
                            <span>I agree to the <a href="#" style="color: var(--primary); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--primary); text-decoration: none;">Privacy Policy</a></span>
                        </label>
                        <span class="field-error" id="termsError"></span>
                    </div>

                    <button type="submit" class="submit-btn full-width primary-glow" id="registerBtn">
                        <i class="fas fa-user-plus btn-icon"></i>
                        <span class="btn-text">Create Free Account</span>
                        <div class="loader-inner"></div>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const slides      = document.querySelectorAll('.slide');
        const dots        = document.querySelectorAll('.dot');
        let currentSlide  = 0;

        function showSlide(index) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            dots[index].classList.add('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
        }

        // Auto-advance slides every 5 seconds
        setInterval(nextSlide, 5000);

        // ─── Configuration ────────────────────────────────────────────────
        const API_BASE = 'http://localhost:5000/api';

        // ─── DOM References ───────────────────────────────────────────────
        const form        = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const btnText     = registerBtn.querySelector('.btn-text');
        const authAlert   = document.getElementById('authAlert');
        const pwdInput    = document.getElementById('regPassword');
        const togglePwd   = document.getElementById('togglePassword');
        const eyeIcon     = document.getElementById('eyeIcon');

        // ─── Toggle Password Visibility ───────────────────────────────────
        togglePwd.addEventListener('click', () => {
            const isHidden = pwdInput.type === 'password';
            pwdInput.type  = isHidden ? 'text' : 'password';
            eyeIcon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
        });

        // ─── Password Strength Meter ──────────────────────────────────────
        pwdInput.addEventListener('input', () => {
            const val = pwdInput.value;
            const strengthFill  = document.getElementById('strengthFill');
            const strengthLabel = document.getElementById('strengthLabel');
            const pwdStrength   = document.getElementById('pwdStrength');

            if (val.length === 0) {
                pwdStrength.style.display = 'none';
                return;
            }
            pwdStrength.style.display = 'flex';

            let score = 0;
            if (val.length >= 8)                    score++;
            if (/[A-Z]/.test(val))                  score++;
            if (/[0-9]/.test(val))                  score++;
            if (/[^A-Za-z0-9]/.test(val))           score++;

            const levels = [
                { pct: '25%',  color: '#ef4444', label: 'Weak' },
                { pct: '50%',  color: '#f97316', label: 'Fair' },
                { pct: '75%',  color: '#eab308', label: 'Good' },
                { pct: '100%', color: '#10b981', label: 'Strong' },
            ];
            const level = levels[score - 1] || levels[0];
            strengthFill.style.width      = level.pct;
            strengthFill.style.background = level.color;
            strengthLabel.textContent     = level.label;
            strengthLabel.style.color     = level.color;
        });

        // ─── Show Alert Banner ────────────────────────────────────────────
        function showAlert(message, type = 'error') {
            authAlert.textContent = message;
            authAlert.className   = `auth-alert show ${type}`;
            authAlert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideAlert() {
            authAlert.className = 'auth-alert';
        }

        // ─── Set Loading State ─────────────────────────────────────────────
        function setLoading(loading) {
            registerBtn.disabled = loading;
            registerBtn.classList.toggle('loading', loading);
            btnText.textContent = loading ? 'Creating Account…' : 'Create Free Account';
        }

        // ─── Clear All Field Errors ────────────────────────────────────────
        function clearErrors() {
            ['nameError','emailError','passwordError','confirmPasswordError','termsError']
                .forEach(id => { document.getElementById(id).textContent = ''; });
        }

        // ─── Form Validation ───────────────────────────────────────────────
        function validateForm(name, email, password, confirmPassword) {
            clearErrors();
            let valid = true;

            if (!name || name.length < 2) {
                document.getElementById('nameError').textContent = 'Full name must be at least 2 characters.';
                valid = false;
            }
            if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address.';
                valid = false;
            }
            if (!password || password.length < 8) {
                document.getElementById('passwordError').textContent = 'Password must be at least 8 characters.';
                valid = false;
            } else if (!/[A-Z]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must include at least one uppercase letter.';
                valid = false;
            } else if (!/[0-9]/.test(password)) {
                document.getElementById('passwordError').textContent = 'Password must include at least one number.';
                valid = false;
            }
            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match.';
                valid = false;
            }
            if (!document.getElementById('agreeTerms').checked) {
                document.getElementById('termsError').textContent = 'You must agree to the Terms of Service.';
                valid = false;
            }
            return valid;
        }

        // ─── Form Submit Handler ───────────────────────────────────────────
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const name            = document.getElementById('regName').value.trim();
            const email           = document.getElementById('regEmail').value.trim();
            const password        = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const region          = document.getElementById('regRegion').value.trim();

            if (!validateForm(name, email, password, confirmPassword)) return;

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, region }),
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.message || 'Registration failed. Please try again.');
                }

                // ── Save token & user info ──
                localStorage.setItem('cropai_token', data.token);
                localStorage.setItem('cropai_user',  JSON.stringify(data.user));

                // ── Show success & redirect ──
                showAlert(`🎉 Account created! Welcome, ${data.user.name}! Redirecting…`, 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (err) {
                showAlert(err.message);
                setLoading(false);
            }
        });

        // ─── Auto-redirect if already logged in ───────────────────────────
        const existingToken = localStorage.getItem('cropai_token') || sessionStorage.getItem('cropai_token');
        if (existingToken) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
