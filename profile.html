<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CropAI Connect</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .profile-section {
            padding: 12rem 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-card {
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .profile-details {
            text-align: left;
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid var(--dark-border);
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            color: white;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .profile-actions {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
        }

        @media (max-width: 600px) {
            .profile-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <div class="logo-dot"></div>
                CropAI<span>Connect</span>
            </a>
            <div class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#recommend">Predictor</a>
                <div id="userProfile" class="user-profile">
                    <span id="userNameHeader" class="user-name"></span>
                    <button id="logoutBtn" class="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="profile-section">
        <div class="container">
            <div class="glass-card profile-card">
                <div class="profile-avatar" id="avatarText">U</div>
                <h1 id="profileName">Loading...</h1>
                <p class="section-subtitle">Farming Intelligence Member</p>

                <div class="profile-details">
                    <div class="detail-item">
                        <span class="detail-label">Full Name</span>
                        <span class="detail-value" id="valName">---</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Email Address</span>
                        <span class="detail-value" id="valEmail">---</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Region</span>
                        <span class="detail-value" id="valRegion">---</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Member Since</span>
                        <span class="detail-value" id="valJoined">---</span>
                    </div>
                </div>

                <div class="profile-actions">
                    <a href="index.html" class="submit-btn full-width primary-glow">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const userStr = localStorage.getItem('cropai_user') || sessionStorage.getItem('cropai_user');
            
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);

            // Set Header Name
            document.getElementById('userNameHeader').textContent = `Hi, ${user.name.split(' ')[0]}`;
            
            // Set Avatar
            document.getElementById('avatarText').textContent = user.name.charAt(0).toUpperCase();

            // Set Details
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('valName').textContent = user.name;
            document.getElementById('valEmail').textContent = user.email;
            document.getElementById('valRegion').textContent = user.region || 'Not Specified';
            
            const joinDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }) : 'Welcome! Today';
            document.getElementById('valJoined').textContent = joinDate;

            // Logout logic
            document.getElementById('logoutBtn').addEventListener('click', function () {
                localStorage.removeItem('cropai_token');
                localStorage.removeItem('cropai_user');
                sessionStorage.removeItem('cropai_token');
                sessionStorage.removeItem('cropai_user');
                window.location.href = 'login.html';
            });
        });
    </script>
</body>

</html>
